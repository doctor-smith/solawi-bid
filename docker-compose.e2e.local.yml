services:

  solawi-bid_frontend:
    image: solawi-bid/frontend:local
    ports:
      - "8080:80"
    environment:
      - ENVIRONMENT=D
      - FRONTEND_URL=http://localhost
      - FRONTEND_PORT=8080
      - BACKEND_URL=http://localhost
      - BACKEND_PORT=8081
    healthcheck:
      test: "curl -f http://localhost:80/ || exit 1"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2m

  solawi-bid_backend:
    image: solawi-bid/backend:local
    env_file:
      - solawi-bid-backend/.env.e2e
    ports:
      - "8081:8080"
    container_name: solawi-bid_backend
    depends_on:
      solawi-bid_database:
        condition: service_healthy
    healthcheck:
      test: "curl 'http://localhost:8080/login' -f -X OPTIONS -H 'Access-Control-Request-Method: POST' -H 'Origin: http://localhost'"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2m

  solawi-bid_database:
    image: mysql:9
    ports:
      - "3306:3306"
    volumes:
      - ./infrastructure/database/setup-local.sql:/docker-entrypoint-initdb.d/setup.sql
    environment:
      - MYSQL_DATABASE=solawi-bid
      - MYSQL_USER=solawi-bid
      - MYSQL_PASSWORD=secure
      - MYSQL_ALLOW_EMPTY_PASSWORD=true
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent" ]
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2m