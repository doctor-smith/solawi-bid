- name: Deploy Application to {{ environment_letter }}
  hosts: all
  become: true
  vars:
    backup_system_db: true
    deployment_id: "{{ lookup('pipe', 'date +%s') }}"
  tasks:

    # ---------------------------
    # GitHub Login
    # ---------------------------
    - name: Log in to GitHub Container Registry
      community.docker.docker_login:
        registry_url: ghcr.io
        username: "{{ ghcr_user }}"
        password: "{{ ghcr_pat }}"
      when: ghcr_pat is defined and ghcr_user is defined

    # ---------------------------
    # Pre-deployment Backup
    # ---------------------------
    - name: Ensure backups directory exists
      file:
        path: "/var/solawi-bid/{{ environment_letter }}/database/backups"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Pre-deployment backup of solawi-bid database only
      community.docker.docker_container_exec:
        container: "solawi-bid_database_{{ environment_letter }}"
        command: >
          sh -c 'mysqldump -u root solawi-bid > /backups/solawi-bid-{{ lookup("pipe", "date +%Y%m%d%H%M%S") }}.sql'
      register: app_backup
      until: app_backup.rc == 0
      retries: 5
      delay: 10

    - name: backup system mysql DB for emergencies
      community.docker.docker_container_exec:
        container: "solawi-bid_database_{{ environment_letter }}"
        command: >
          sh -c 'mysqldump -u root mysql > /backups/mysql-system-{{ lookup("pipe", "date +%Y%m%d%H%M%S") }}.sql'
      register: system_backup
      until: system_backup.rc == 0
      retries: 5
      delay: 10
      when: backup_system_db | default(false)

    # ---------------------------
    # DB Setup
    # ---------------------------
    - name: Ensure /var/solawi-bid/{{ environment_letter }}/database directory exists
      file:
        path: "/var/solawi-bid/{{ environment_letter }}/database"
        state: directory

    - name: Ensure database initialization script for {{ environment_letter }} exists
      copy:
        src: "{{ playbook_dir }}/../database/setup.sql"
        dest: "/var/solawi-bid/{{ environment_letter }}/database/setup.sql"
        owner: root
        group: root
        mode: '0644'

    - name: Ensure database data directory exists
      file:
        path: "/var/solawi-bid/{{ environment_letter }}/database/data"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure solawi-bid-{{ environment_letter }} network exists
      community.docker.docker_network:
        name: "solawi-bid-{{ environment_letter }}"

    - name: Ensure solawi-bid-{{ environment_letter }} database container is running
      vars:
        database_cpu: >
          {% if environment_letter == 'P' %}2{% elif environment_letter == 'Q' %}1{% else %}0.5{% endif %}
        database_mem: >
          {% if environment_letter == 'P' %}4096M{% elif environment_letter == 'Q' %}1024M{% else %}512M{% endif %}
      community.docker.docker_container:
        name: "solawi-bid_database_{{ environment_letter }}"
        image: "mysql:9"
        state: started
        restart_policy: always
        cpus: "{{ database_cpu | float }}"
        memory: "{{ database_mem }}"
        ports:
          - "3306"
        volumes:
          - "/var/solawi-bid/{{ environment_letter }}/database/data:/var/lib/mysql"
          - "/var/solawi-bid/{{ environment_letter }}/database/setup.sql:/docker-entrypoint-initdb.d/setup.sql"
          - "/var/solawi-bid/{{ environment_letter }}/database/backups:/backups"
        env:
          MYSQL_DATABASE: solawi-bid
          MYSQL_USER: solawi-bid
          MYSQL_PASSWORD: "{{ mysql_password }}"
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
        healthcheck:
          test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent" ]
          interval: 5s
          timeout: 3s
          retries: 5
          start_period: 2m
        networks:
          - name: "solawi-bid-{{ environment_letter }}"

    # ---------------------------
    # Frontend Deployment
    # ---------------------------
    - name: Deploy Frontend container for {{ environment_letter }}
      vars:
        frontend_cpu: >
          {% if environment_letter == 'P' %}1{% elif environment_letter == 'Q' %}0.5{% else %}0.25{% endif %}
        frontend_mem: >
          {% if environment_letter == 'P' %}2048M{% elif environment_letter == 'Q' %}768M{% else %}512M{% endif %}
        keys:
          - "traefik.enable"
          - "traefik.http.routers.solawi-bid_frontend_{{ environment_letter }}.rule"
          - "traefik.http.routers.solawi-bid_frontend_{{ environment_letter }}.entrypoints"
          - "traefik.http.services.solawi-bid_frontend_{{ environment_letter }}.loadbalancer.server.port"
          - "traefik.http.routers.solawi-bid_frontend_{{ environment_letter }}.tls"
          - "traefik.http.routers.solawi-bid_frontend_{{ environment_letter }}.tls.certresolver"
        values:
          - "true"
          - "Host(`{{ frontend_domain }}`)"
          - "web, websecure"
          - "80"
          - "true"
          - "letsencrypt"
        dynamic_dict: "{{ dict(keys | zip(values)) }}"
      community.docker.docker_container:
        name: "solawi-bid_frontend_{{ environment_letter }}"
        image: "{{ frontend_image_name }}"
        state: "started"
        restart_policy: "always"
        pull: always
        recreate: true
        comparisons:
          image: strict
        cpus: "{{ frontend_cpu | float }}"
        memory: "{{ frontend_mem }}"
        env:
          ENVIRONMENT: "{{ environment_letter }}"
          FRONTEND_URL: "https://{{ frontend_domain }}"
          FRONTEND_PORT: "443"
          BACKEND_URL: "https://{{ backend_domain }}"
          BACKEND_PORT: "443"
        labels: "{{ dynamic_dict }}"
        healthcheck:
          test: "curl -f http://localhost:80/ || exit 1"
          interval: 15s
          timeout: 3s
          retries: 5
          start_period: 2m
        networks:
          - name: reverse-proxy

    # ---------------------------
    # Wait for MySQL healthy
    # ---------------------------
    - name: Wait for MySQL to be healthy
      community.docker.docker_container_info:
        name: "solawi-bid_database_{{ environment_letter }}"
      register: db_info
      until: db_info.container.State.Health.Status == "healthy"
      retries: 30
      delay: 4

    # ---------------------------
    # Backend Deployment
    # ---------------------------
    - name: Deploy Backend container for {{ environment_letter }}
      vars:
        backend_replicas: >
          {% if environment_letter == 'P' %}2{% else %}1{% endif %}
        backend_cpu: >
          {% if environment_letter == 'P' %}0.75{% elif environment_letter == 'Q' %}0.5{% else %}0.25{% endif %}
        backend_mem: >
          {% if environment_letter == 'P' %}1024M{% elif environment_letter == 'Q' %}768M{% else %}512M{% endif %}
        keys:
          - "traefik.enable"
          - "traefik.http.routers.solawi-bid_backend_{{ environment_letter }}.rule"
          - "traefik.http.routers.solawi-bid_backend_{{ environment_letter }}.entrypoints"
          - "traefik.http.services.solawi-bid_backend_{{ environment_letter }}.loadbalancer.server.port"
          - "traefik.http.routers.solawi-bid_backend_{{ environment_letter }}.tls"
          - "traefik.http.routers.solawi-bid_backend_{{ environment_letter }}.tls.certresolver"
        values:
          - "true"
          - "Host(`{{ backend_domain }}`)"
          - "web, websecure"
          - "8080"
          - "true"
          - "letsencrypt"
        dynamic_dict: "{{ dict(keys | zip(values)) }}"
      loop: "{{ range(1, (backend_replicas | int) + 1) | list }}"
      loop_control:
        pause: 5

      community.docker.docker_container:
        name: "solawi-bid_backend_{{ environment_letter }}_{{ item ~ '' }}"
        image: "{{ backend_image_name }}"
        state: "started"
        restart_policy: "always"
        pull: always
        recreate: true
        comparisons:
          image: strict
        cpus: "{{ backend_cpu | float }}"
        memory: "{{ backend_mem }}"
        env:
          KTOR_ENV: "{{ environment_letter }}"
          BACKEND_PORT: "8080"
          JWT_DOMAIN: solawi-bid_backend
          JWT_AUDIENCE: solawi-bid_backend
          JWT_REALM: solawi-bid_backend
          JWT_SECRET: "{{ jwt_secret }}"
          DATABASE_URL: "jdbc:mysql://solawi-bid_database_{{ environment_letter }}:3306/solawi-bid"
          DATABASE_DRIVER: com.mysql.jdbc.Driver
          DATABASE_USER: solawi-bid
          DATABASE_PASSWORD: "{{ mysql_password }}"
          APPLICATION_OWNER_USERNAME: "{{ application_owner_username }}"
          APPLICATION_OWNER_PASSWORD: "{{ application_owner_password }}"
          SMTP_PASSWORD: "{{ smtp_password }}"
        labels: "{{ dynamic_dict }}"
        healthcheck:
          test: "curl 'http://localhost:8080/login' -f -X OPTIONS -H 'Access-Control-Request-Method: POST' -H 'Origin: http://localhost'"
          interval: 15s
          timeout: 3s
          retries: 5
          start_period: 30s
        networks:
          - name: "solawi-bid-{{ environment_letter }}"
          - name: reverse-proxy