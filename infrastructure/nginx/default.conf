server {
    listen 80;

    root /usr/share/nginx/html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control no-cache;
        expires 0;
    }

    # Cache busting: Dateien mit Content-Hash im Namen (z. B. main.a1b2c3d4.js)
    # duerfen langfristig gecached werden. Bei Aenderungen wechselt der Hash und
    # damit die URL, wodurch Browser automatisch die neue Version laden.
    location ~* "\.[0-9a-f]{8,}\.(?:js|css)$" {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}
